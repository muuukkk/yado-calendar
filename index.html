<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="宿カレンダー">
<title>宿カレンダー管理</title>
<style>
  :root { --accent:#FF385C; --ink:#222; --sub:#717171; --line:#ebebeb; --ok:#008a05; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:"Hiragino Sans","Yu Gothic UI","Segoe UI",system-ui,sans-serif; }
  body { color:var(--ink); background:#fff; }
  header { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; background:#fff; z-index:10; flex-wrap:wrap; }
  #propSel { font-size:15px; font-weight:700; border:none; background:#fff; max-width:46vw; cursor:pointer; }
  .month-nav { display:flex; align-items:center; gap:6px; }
  .month-nav button { border:1px solid var(--line); background:#fff; border-radius:50%; width:32px; height:32px; font-size:15px; cursor:pointer; }
  .month-nav button:hover { background:#f7f7f7; }
  #monthLabel { font-size:15px; font-weight:700; min-width:104px; text-align:center; cursor:pointer; border-radius:8px; padding:4px 6px; }
  #monthLabel:hover { background:#f7f7f7; }
  #monthPickerOverlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:60; display:none; align-items:center; justify-content:center; padding:16px; }
  #monthPickerOverlay.show { display:flex; }
  .mpmodal { background:#fff; border-radius:14px; padding:20px; width:320px; max-width:100%; }
  .mp-head { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:14px; }
  .mp-head button { border:1px solid var(--line); background:#fff; border-radius:50%; width:34px; height:34px; font-size:15px; cursor:pointer; }
  .mp-head div { font-size:16px; font-weight:700; min-width:74px; text-align:center; }
  .mp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .mp-grid button { padding:13px 0; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:14px; cursor:pointer; }
  .mp-grid button:hover { border-color:#222; }
  .mp-grid button.cur { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }
  .mp-grid button.past { color:#c0c0c0; }
  .spacer { flex:1; }
  .chipbar { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .chip { border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer; }
  .chip:hover { border-color:#222; }
  #status { font-size:11px; color:var(--sub); padding:3px 16px; min-height:17px; }
  .layout { display:flex; gap:0; align-items:flex-start; }
  .cal-wrap { flex:1; padding:6px 8px 60px 14px; min-width:0; }
  .month-sec { margin-bottom:22px; }
  .mlabel { font-size:15px; font-weight:700; padding:10px 4px 6px; }
  table.cal { width:100%; border-collapse:collapse; table-layout:fixed; }
  .cal th { font-size:11px; color:var(--sub); font-weight:600; padding:5px 0; }
  .cal td { border:1px solid var(--line); height:88px; vertical-align:top; padding:4px 5px; cursor:pointer; position:relative; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; touch-action:manipulation; overflow:hidden; }
  .cal td.empty { background:#fafafa; cursor:default; }
  .cal td:hover:not(.empty) { border-color:#bbb; }
  .cal td.selected { outline:2px solid var(--ink); outline-offset:-2px; border-radius:8px; z-index:1; }
  .d { font-size:12px; font-weight:600; }
  .d.today { color:#fff; background:var(--accent); border-radius:50%; display:inline-block; width:20px; height:20px; text-align:center; line-height:20px; }
  .price { font-size:12px; font-weight:700; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:clip; letter-spacing:-0.3px; font-variant-numeric:tabular-nums; }
  .meta { font-size:9px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; }
  td.booked { background:#f0f7ff; }
  td.booked .price { color:#9aa5b1; text-decoration:line-through; font-weight:500; }
  .guest { font-size:9px; background:#1a73e8; color:#fff; border-radius:4px; padding:1px 4px; display:inline-block; margin-top:3px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  td.blocked { background:repeating-linear-gradient(45deg,#fafafa,#fafafa 6px,#f0f0f0 6px,#f0f0f0 12px); }
  .blocklabel { font-size:9px; color:var(--sub); margin-top:3px; white-space:nowrap; }
  .minflag { font-size:9px; background:#ff8f00; color:#fff; border-radius:4px; padding:1px 4px; display:inline-block; margin-top:2px; white-space:nowrap; }
  #panelClose { display:none; float:right; }
  #selBar { position:fixed; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom)); z-index:44; background:#222; color:#fff; border-radius:999px; padding:8px 8px 8px 18px; display:none; align-items:center; justify-content:space-between; font-size:14px; box-shadow:0 4px 14px rgba(0,0,0,.3); }
  #selBar button { border:none; background:var(--accent); color:#fff; border-radius:999px; padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  #loadingMore { text-align:center; color:var(--sub); font-size:12px; padding:12px; display:none; }
  .panel { width:310px; border-left:1px solid var(--line); padding:16px; position:sticky; top:56px; }
  .panel h2 { font-size:15px; margin-bottom:4px; }
  .panel .sel-info { font-size:12px; color:var(--sub); margin-bottom:12px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; font-weight:600; margin-bottom:3px; }
  .field input, .field select { width:100%; padding:9px 10px; border:1px solid #b0b0b0; border-radius:8px; font-size:16px; }
  .field .hint { font-size:11px; color:var(--sub); margin-top:3px; }
  .auto-tag { font-size:10px; color:var(--ok); margin-left:5px; font-weight:400; }
  .btn { width:100%; padding:12px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
  .btn:disabled { background:#ddd; cursor:default; }
  .btn.ghost { background:#fff; color:var(--ink); border:1px solid var(--ink); margin-top:8px; }
  .btn.small { width:auto; padding:7px 12px; font-size:12px; }
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:12px 20px; border-radius:8px; font-size:14px; display:none; z-index:100; max-width:90vw; }
  .legend { display:flex; gap:12px; font-size:11px; color:var(--sub); padding:0 16px 4px; flex-wrap:wrap; }
  .legend span::before { content:""; display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:4px; vertical-align:-1px; }
  .lg-open::before { background:#fff; border:1px solid #ccc; }
  .lg-booked::before { background:#f0f7ff; border:1px solid #cfe3ff; }
  .lg-blocked::before { background:repeating-linear-gradient(45deg,#fafafa,#fafafa 3px,#e0e0e0 3px,#e0e0e0 6px); }
  #settingsOverlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:none; align-items:flex-start; justify-content:center; padding:16px; overflow:auto; }
  #settingsOverlay.show { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:22px; width:460px; max-width:100%; margin:auto; }
  .modal h2 { font-size:17px; margin-bottom:6px; }
  .modal h3 { font-size:13px; margin:16px 0 8px; border-top:1px solid var(--line); padding-top:14px; }
  .modal .desc { font-size:11px; color:var(--sub); margin-bottom:14px; }
  .modal .row2 { display:flex; gap:10px; }
  .modal .row2 .field { flex:1; }
  .rowdef { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
  .rowdef input { padding:7px 8px; font-size:13px; border:1px solid #b0b0b0; border-radius:6px; }
  .rowdef .rd-code { width:52px; }
  .rowdef .rd-label { flex:1; }
  .rowdef .rd-ratio { width:64px; }
  .rowdef button { border:none; background:#eee; border-radius:6px; width:26px; height:26px; cursor:pointer; }
  @media (max-width:820px){
    .layout{flex-direction:column;}
    .panel{position:fixed; left:0; right:0; bottom:0; width:100%; border-left:none; border-top:1px solid var(--line); background:#fff; z-index:45; border-radius:16px 16px 0 0; box-shadow:0 -6px 24px rgba(0,0,0,.18); max-height:78vh; overflow:auto; transform:translateY(110%); transition:transform .25s; padding-bottom:30px;}
    .panel.open{transform:translateY(0);}
    #panelClose{display:inline-block;}
    #selBar.show{display:flex;}
    .cal td{height:auto; min-height:58px; padding:2px 3px;}
    .d{font-size:11px;} .d.today{width:17px;height:17px;line-height:17px;}
    .price{font-size:10px; margin-top:2px; letter-spacing:-0.4px;}
    .meta{display:none;}
    .guest{font-size:8px; padding:1px 3px; margin-top:2px; border-radius:3px;}
    .blocklabel{font-size:8px;}
    header{padding:8px 10px; gap:6px;}
    .cal-wrap{padding:4px 4px 40px 6px;}
    .mlabel { position:sticky; top:0; background:rgba(255,255,255,.95); z-index:5; }
  }
</style>
</head>
<body>
<header>
  <select id="propSel"></select>
  <div class="month-nav">
    <button id="prevBtn">‹</button>
    <div id="monthLabel"></div>
    <button id="nextBtn">›</button>
  </div>
  <button class="chip" id="todayBtn">今日</button>
  <div class="spacer"></div>
  <div class="chipbar">
    <button class="chip" data-dow="5">金</button>
    <button class="chip" data-dow="6">土</button>
    <button class="chip" data-dow="0">日</button>
    <button class="chip" id="clearSel">解除</button>
    <button class="chip" id="reloadBtn">↻</button>
    <button class="chip" id="settingsBtn">⚙</button>
  </div>
</header>
<div class="legend"><span class="lg-open">空室</span><span class="lg-booked">予約済</span><span class="lg-blocked">ブロック中</span><span style="border:none">スクロールで翌月が読み込まれます</span></div>
<div id="status"></div>
<div class="layout">
  <div class="cal-wrap">
    <div id="calList"></div>
    <div id="loadingMore">翌月を読み込み中…</div>
  </div>
  <div class="panel" id="panel">
    <button id="panelClose" class="chip">閉じる</button>
    <h2>選択した日付の編集</h2>
    <div class="sel-info" id="selInfo">日付を選択してください</div>
    <div id="rowInputs"></div>
    <div class="field">
      <label>最低泊数</label>
      <input type="number" id="inMin" placeholder="変更しない" min="1" inputmode="numeric">
    </div>
    <div class="field">
      <label>空室状態</label>
      <select id="inAvail">
        <option value="">変更しない</option>
        <option value="1">空室にする(販売)</option>
        <option value="0">ブロックする(販売停止)</option>
      </select>
      <div class="hint">予約済みの日は変更できません</div>
    </div>
    <button class="btn" id="saveBtn" disabled>Beds24に保存</button>
    <button class="btn ghost" id="resetBtn">入力をクリア</button>
  </div>
</div>

<div id="settingsOverlay">
  <div class="modal">
    <h2>設定</h2>
    <div class="desc">キーはこの端末のブラウザ内にのみ保存されます(外部サーバーには送られません)。</div>
    <div class="field"><label>Beds24 APIキー(共通)</label><input type="text" id="cfgApiKey"></div>
    <div class="row2">
      <div class="field"><label>下限価格(円/泊)</label><input type="number" id="cfgFloor"><div class="hint">これを下回る保存は警告</div></div>
      <div class="field"><label>標準の最低泊数</label><input type="number" id="cfgStdMin"><div class="hint">違う日はオレンジで強調表示</div></div>
    </div>
    <h3>物件: <select id="cfgPropSel" style="font-size:13px"></select> <button class="btn small ghost" id="cfgAddProp" style="margin:0 0 0 8px">+物件を追加</button></h3>
    <div class="field"><label>物件名</label><input type="text" id="cfgName"></div>
    <div class="row2">
      <div class="field"><label>propKey</label><input type="text" id="cfgPropKey"></div>
      <div class="field"><label>roomId</label><input type="text" id="cfgRoomId"></div>
    </div>
    <h3>価格行(チャネル別)</h3>
    <div class="desc">係数=基準価格(1行目)に掛ける倍率。空欄なら自動計算しません。Beds24のPRICES > DAILY PRICE RULESで行を追加すると新しいPコードが使えます。</div>
    <div style="display:flex;gap:6px;font-size:10px;color:var(--sub);margin-bottom:2px"><span style="width:52px">Pコード</span><span style="flex:1">ラベル</span><span style="width:64px">係数</span><span style="width:26px"></span></div>
    <div id="cfgRows"></div>
    <button class="btn small ghost" id="cfgAddRow" style="margin-top:4px">+行を追加</button>
    <div style="margin-top:18px"><button class="btn" id="cfgSaveBtn">保存して開始</button></div>
    <button class="btn ghost" id="cfgDelProp">この物件を削除</button>
  </div>
</div>
<div id="monthPickerOverlay">
  <div class="mpmodal">
    <div class="mp-head">
      <button id="mpPrevY">‹</button>
      <div id="mpYear"></div>
      <button id="mpNextY">›</button>
    </div>
    <div class="mp-grid" id="mpGrid"></div>
  </div>
</div>
<div id="selBar"><span id="selBarText"></span><button id="selBarEdit">価格・泊数を編集</button></div>
<div id="toast"></div>
<script>
const DEFAULT_ROWS = [
  {code:'p1', label:'Airbnb', ratio:1},
  {code:'p2', label:'Booking.com', ratio:1.19},
  {code:'p3', label:'自社HP', ratio:0.95},
  {code:'p4', label:'HP3泊〜', ratio:0.855},
  {code:'p5', label:'HP4泊〜', ratio:0.808},
  {code:'p6', label:'HP7泊〜', ratio:0.779},
  {code:'p7', label:'HP直前', ratio:0.808},
  {code:'p8', label:'HP直前3泊', ratio:0.727},
  {code:'p9', label:'HP直前4泊', ratio:0.686}
];
const DEFAULT_PROP = () => ({name:'新しい物件', propKey:'', roomId:'', rows: JSON.parse(JSON.stringify(DEFAULT_ROWS))});
let CONFIG = null;

function loadConfig(){
  try { CONFIG = JSON.parse(localStorage.getItem('yadoCalConfig2')); } catch(e){ CONFIG = null; }
  if(!CONFIG){
    try {
      const old = JSON.parse(localStorage.getItem('yadoCalConfig'));
      if(old && old.apiKey){
        CONFIG = { apiKey: old.apiKey, floor: old.floor||8000, active:0, props:[{
          name: old.name||'物件1', propKey: old.propKey, roomId: old.roomId,
          rows: JSON.parse(JSON.stringify(DEFAULT_ROWS))
        }]};
        saveConfig(CONFIG);
      }
    } catch(e){}
  }
}
function saveConfig(c){ localStorage.setItem('yadoCalConfig2', JSON.stringify(c)); CONFIG = c; }
const prop = () => CONFIG.props[CONFIG.active||0];

const state = { startY: new Date().getFullYear(), startM: new Date().getMonth(), months: [], roomDates: {}, bookedMap: {}, selected: new Set(), dragging: false, dragMode: true, lastPointerType: null, appending: false };
const MAX_MONTHS = 18;

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const key = (y,m,d) => `${y}${pad(m+1)}${pad(d)}`;
const iso = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const yen = v => '¥' + Math.round(parseFloat(v)).toLocaleString();
const round10 = v => Math.round(v/10)*10;

function toast(msg, ms=3000){ const t=$('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none', ms); }
function setStatus(msg){ $('status').textContent = msg; }

async function api(ep, body){
  // Content-Typeヘッダーを付けるとCORS preflightが発生しBeds24側で失敗するため付けない
  const r = await fetch('https://api.beds24.com/json/'+ep, {method:'POST', body: JSON.stringify(body)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  if(j && j.error) throw new Error(j.error);
  return j;
}
const auth = () => ({apiKey: CONFIG.apiKey, propKey: prop().propKey});

function renderPropSel(){
  const sel = $('propSel');
  sel.innerHTML = CONFIG.props.map((p,i)=>`<option value="${i}" ${i===(CONFIG.active||0)?'selected':''}>${p.name}</option>`).join('');
}
$('propSel').addEventListener('change', ()=>{ CONFIG.active = parseInt($('propSel').value); saveConfig(CONFIG); renderRowInputs(); resetTo(state.startY, state.startM); });

function renderRowInputs(){
  const rows = prop().rows||[];
  $('rowInputs').innerHTML = rows.map((r,i)=>`
    <div class="field">
      <label>${r.label} (${r.code.toUpperCase()})${i===0?' ─ 基準':''} <span class="auto-tag" data-tag="${r.code}"></span></label>
      <input type="number" data-code="${r.code}" data-i="${i}" placeholder="変更しない" inputmode="numeric">
      ${i===0?'<div class="hint">入力すると他の行を係数で自動計算(手修正も可)</div>':''}
    </div>`).join('');
  const inputs = [...$('rowInputs').querySelectorAll('input')];
  const base = inputs[0];
  if(base){
    base.addEventListener('input', ()=>{
      const v = parseFloat(base.value);
      inputs.slice(1).forEach(inp=>{
        if(inp.dataset.manual==='1') return;
        const r = rows[parseInt(inp.dataset.i)];
        const tag = $('rowInputs').querySelector(`[data-tag="${r.code}"]`);
        if(isNaN(v) || !r.ratio){ inp.value=''; if(tag) tag.textContent=''; return; }
        inp.value = Math.max(round10(v * r.ratio), CONFIG.floor||0);
        if(tag) tag.textContent='自動';
      });
    });
    inputs.slice(1).forEach(inp=>{
      inp.addEventListener('keydown', ()=>{
        inp.dataset.manual='1';
        const r = rows[parseInt(inp.dataset.i)];
        const tag = $('rowInputs').querySelector(`[data-tag="${r.code}"]`);
        if(tag) tag.textContent='手動';
      });
    });
  }
}

// ==== データ取得(複数月を1回のAPI呼び出しでまとめて取得し、利用制限を回避) ====
async function fetchRange(y,m,count){
  const endD = new Date(y, m+count, 0); // 最終月の末日
  const yest = new Date(); yest.setDate(yest.getDate()-1); yest.setHours(0,0,0,0);
  const startD = new Date(y, m, 1);
  const fromDate = startD < yest ? yest : startD;
  const from = iso(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate()), to = iso(endD.getFullYear(), endD.getMonth(), endD.getDate());
  const skipRates = endD < yest; // 全期間が過去なら料金取得をスキップ
  const arrFrom = new Date(y, m, 1); arrFrom.setDate(arrFrom.getDate()-45);
  const [rd, bk] = await Promise.all([
    skipRates ? Promise.resolve({}) : api('getRoomDates', {authentication:auth(), roomId: prop().roomId, from, to}),
    api('getBookings', {authentication:auth(), arrivalFrom: iso(arrFrom.getFullYear(),arrFrom.getMonth(),arrFrom.getDate()), arrivalTo: to})
  ]);
  Object.assign(state.roomDates, rd || {});
  (Array.isArray(bk)?bk:[]).forEach(b=>{
    if(!['1','2','3','4'].includes(String(b.status))) return; // 0=キャンセルは除外
    const label = String(b.status)==='4' ? 'ブラックアウト' : `${b.guestFirstName||''} (${b.referer||b.apiSource||''})`;
    let d = new Date(b.firstNight+'T00:00:00');
    const end = new Date(b.lastNight+'T00:00:00');
    while(d <= end){
      state.bookedMap[key(d.getFullYear(), d.getMonth(), d.getDate())] = label;
      d.setDate(d.getDate()+1);
    }
  });
}

// ==== 月セクションの描画 ====
function monthHTML(y,m){
  const firstDow = new Date(y,m,1).getDay();
  const last = new Date(y,m+1,0).getDate();
  const today = new Date(); const todayKey = key(today.getFullYear(), today.getMonth(), today.getDate());
  const baseCode = (prop().rows && prop().rows[0]) ? prop().rows[0].code : 'p1';
  let html = `<div class="mlabel">${y}年${m+1}月</div><table class="cal"><thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead><tbody>`;
  let cell=0;
  html+='<tr>';
  for(let i=0;i<firstDow;i++){ html+='<td class="empty"></td>'; cell++; }
  for(let d=1; d<=last; d++){
    const k = key(y,m,d);
    const rd = state.roomDates[k]||{};
    const booked = state.bookedMap[k];
    const blocked = !booked && String(rd.i)==='0';
    const cls = [booked?'booked':'', blocked?'blocked':'', state.selected.has(k)?'selected':''].join(' ');
    html+=`<td class="${cls}" data-k="${k}">`;
    html+=`<span class="d ${k===todayKey?'today':''}">${d}</span>`;
    if(rd[baseCode]!==undefined) html+=`<div class="price">${yen(rd[baseCode])}</div>`;
    if(rd.m!==undefined){
      // 標準と違う最低泊数はオレンジで強調(スマホでも表示)
      if(parseInt(rd.m)!==(CONFIG.stdMin||2)) html+=`<div class="minflag">最低${rd.m}泊</div>`;
      else html+=`<div class="meta">最低${rd.m}泊</div>`;
    }
    if(booked) html+=`<span class="guest">${booked}</span>`;
    if(blocked) html+=`<div class="blocklabel">ブロック</div>`;
    html+='</td>';
    cell++;
    if(cell%7===0 && d<last) html+='</tr><tr>';
  }
  while(cell%7!==0){ html+='<td class="empty"></td>'; cell++; }
  html+='</tr></tbody></table>';
  return html;
}

function bindCells(root){
  root.querySelectorAll('td[data-k]').forEach(td=>{
    if(window.PointerEvent){
      // マウス: pointerdownでドラッグ範囲選択 / タッチ: clickで単純トグル(スクロールと誤反応しない)
      td.addEventListener('pointerdown', e=>{
        state.lastPointerType = e.pointerType;
        if(e.pointerType==='mouse'){
          e.preventDefault();
          state.dragging=true; state.dragMode=!state.selected.has(td.dataset.k);
          toggleSel(td.dataset.k, state.dragMode);
        }
      });
      td.addEventListener('pointerover', e=>{ if(state.dragging && e.pointerType==='mouse') toggleSel(td.dataset.k, state.dragMode); });
      td.addEventListener('click', ()=>{
        if(state.lastPointerType!=='mouse') toggleSel(td.dataset.k, !state.selected.has(td.dataset.k));
      });
    } else {
      // PointerEvent非対応ブラウザ向けフォールバック
      td.addEventListener('click', ()=> toggleSel(td.dataset.k, !state.selected.has(td.dataset.k)));
    }
  });
}
document.addEventListener('pointerup', ()=> state.dragging=false);
document.addEventListener('pointercancel', ()=> state.dragging=false);

function toggleSel(k, on){
  if(on) state.selected.add(k); else state.selected.delete(k);
  const td = document.querySelector(`td[data-k="${k}"]`);
  if(td) td.classList.toggle('selected', on);
  updatePanel();
}
function refreshSel(){
  document.querySelectorAll('td[data-k]').forEach(td=>td.classList.toggle('selected', state.selected.has(td.dataset.k)));
  updatePanel();
}
function updatePanel(){
  const n = state.selected.size;
  $('selInfo').textContent = n ? `${n}日選択中` : '日付を選択してください';
  $('saveBtn').disabled = n===0;
  // スマホ: 下部バーは常時表示(選択状況を表示し、編集シートを開く入口にする)
  $('selBarText').textContent = n ? `${n}日選択中` : '日付をタップで選択';
  $('selBarEdit').style.display = n ? 'block' : 'none';
  if(!$('panel').classList.contains('open')) $('selBar').classList.add('show');
  else $('selBar').classList.remove('show');
}
$('selBarEdit').onclick = ()=>{ $('panel').classList.add('open'); $('selBar').classList.remove('show'); };
$('panelClose').onclick = ()=>{ $('panel').classList.remove('open'); updatePanel(); };
function friendlyError(e){
  const msg = /credit|limit|too many/i.test(e.message)
    ? 'Beds24のAPI利用制限に達しました。5分ほど待ってから ↻ を押してください'
    : '読み込みエラー: '+e.message;
  toast(msg, 6000); setStatus('');
}
function updateMonthLabel(){ $('monthLabel').textContent = `${state.startY}年${state.startM+1}月 ▾`; }

// ==== 無限スクロール(3ヶ月ずつまとめて読み込み=API呼び出しを1/3に) ====
const CHUNK = 3;
function addSection(y,m){
  state.months.push({y,m});
  const div = document.createElement('div');
  div.className = 'month-sec';
  div.innerHTML = monthHTML(y,m);
  $('calList').appendChild(div);
  bindCells(div);
}
function rebuildSections(){
  $('calList').innerHTML = state.months.map(mm=>`<div class="month-sec">${monthHTML(mm.y,mm.m)}</div>`).join('');
  bindCells($('calList'));
  refreshSel();
}
async function appendChunk(){
  if(state.appending || state.months.length >= MAX_MONTHS) return;
  if(!CONFIG || !CONFIG.apiKey || !prop() || !prop().propKey) return;
  state.appending = true;
  $('loadingMore').style.display = 'block';
  const lastM = state.months[state.months.length-1];
  const y = lastM ? (lastM.m===11 ? lastM.y+1 : lastM.y) : state.startY;
  const m = lastM ? (lastM.m+1)%12 : state.startM;
  const count = Math.min(CHUNK, MAX_MONTHS - state.months.length);
  try{
    await fetchRange(y,m,count);
    for(let i=0;i<count;i++){
      const d = new Date(y, m+i, 1);
      addSection(d.getFullYear(), d.getMonth());
    }
    refreshSel();
    setStatus(`最終更新: ${new Date().toLocaleTimeString('ja-JP')}　(Beds24連携中)`);
  }catch(e){
    friendlyError(e);
  }
  $('loadingMore').style.display = 'none';
  state.appending = false;
}

async function resetTo(y,m){
  if(!CONFIG || !CONFIG.apiKey || !prop() || !prop().propKey){ openSettings(); return; }
  renderPropSel();
  state.startY = y; state.startM = m;
  state.months = []; state.roomDates = {}; state.bookedMap = {};
  $('calList').innerHTML = '';
  updateMonthLabel();
  window.scrollTo(0,0);
  await appendChunk();
}

window.addEventListener('scroll', ()=>{
  if(window.innerHeight + window.scrollY > document.body.scrollHeight - 600) appendChunk();
});

$('prevBtn').onclick = ()=>{ let y=state.startY, m=state.startM-1; if(m<0){m=11;y--;} state.selected.clear(); resetTo(y,m); };
$('nextBtn').onclick = ()=>{ let y=state.startY, m=state.startM+1; if(m>11){m=0;y++;} state.selected.clear(); resetTo(y,m); };
$('todayBtn').onclick = ()=>{ const t=new Date(); state.selected.clear(); resetTo(t.getFullYear(), t.getMonth()); };
$('reloadBtn').onclick = async ()=>{
  if(!state.months.length){ resetTo(state.startY, state.startM); return; }
  // 表示中の全期間を1回のAPI呼び出しで再取得
  try{
    setStatus('更新中…');
    state.roomDates = {}; state.bookedMap = {};
    await fetchRange(state.startY, state.startM, state.months.length);
    rebuildSections();
    setStatus(`最終更新: ${new Date().toLocaleTimeString('ja-JP')}　(Beds24連携中)`);
  }catch(e){ friendlyError(e); }
};
$('clearSel').onclick = ()=>{ state.selected.clear(); refreshSel(); };
$('resetBtn').onclick = ()=>{
  $('rowInputs').querySelectorAll('input').forEach(i=>{ i.value=''; delete i.dataset.manual; });
  $('rowInputs').querySelectorAll('.auto-tag').forEach(t=>t.textContent='');
  $('inMin').value=''; $('inAvail').value='';
};
document.querySelectorAll('.chip[data-dow]').forEach(ch=>{
  ch.onclick = ()=>{
    const dow = parseInt(ch.dataset.dow);
    state.months.forEach(mm=>{
      const last = new Date(mm.y, mm.m+1, 0).getDate();
      for(let d=1; d<=last; d++){
        if(new Date(mm.y, mm.m, d).getDay()===dow) state.selected.add(key(mm.y,mm.m,d));
      }
    });
    refreshSel();
  };
});

$('saveBtn').onclick = async ()=>{
  const rowVals = {};
  $('rowInputs').querySelectorAll('input').forEach(inp=>{ if(inp.value) rowVals[inp.dataset.code] = inp.value; });
  const mn=$('inMin').value, av=$('inAvail').value;
  if(!Object.keys(rowVals).length && !mn && av===''){ toast('変更内容を入力してください'); return; }
  const floor = CONFIG.floor || 0;
  const below = Object.values(rowVals).filter(v=>parseFloat(v) < floor);
  if(below.length && !confirm(`警告: 下限価格 ${yen(floor)} を下回る価格が含まれます。本当に保存しますか?`)) return;
  const dates={};
  const bookedSel=[];
  state.selected.forEach(k=>{
    const o={};
    Object.entries(rowVals).forEach(([c,v])=> o[c]=v);
    if(mn) o.m=mn;
    if(av!==''){
      if(state.bookedMap[k]){ bookedSel.push(k); } else { o.i=av; }
    }
    if(Object.keys(o).length) dates[k]=o;
  });
  if(bookedSel.length && av!==''){ toast(`予約済みの${bookedSel.length}日は空室状態を変更せずスキップします`, 4000); }
  if(!Object.keys(dates).length){ toast('適用対象がありません'); return; }
  const labelOf = c => { const r=(prop().rows||[]).find(r=>r.code===c); return r?r.label:c.toUpperCase(); };
  const parts = Object.entries(rowVals).map(([c,v])=>`${labelOf(c)}→${yen(v)}`);
  if(mn) parts.push(`最低${mn}泊`); if(av!=='') parts.push(av==='1'?'空室にする':'ブロック');
  if(!confirm(`${Object.keys(dates).length}日に適用します:\n${parts.join(' / ')}\n\nBeds24に送信しますか?`)) return;
  $('saveBtn').disabled=true; setStatus('保存中…');
  try{
    await api('setRoomDates', {authentication:auth(), roomId: prop().roomId, dates});
    toast('保存しました');
    // 保存した日付を含む月だけ再取得(API節約)し、画面は全月描き直し
    const ks = Object.keys(dates).sort();
    const y0=+ks[0].slice(0,4), m0=+ks[0].slice(4,6)-1;
    const y1=+ks[ks.length-1].slice(0,4), m1=+ks[ks.length-1].slice(4,6)-1;
    state.selected.clear();
    $('resetBtn').onclick();
    $('panel').classList.remove('open');
    try{ await fetchRange(y0, m0, (y1-y0)*12+(m1-m0)+1); }catch(e){}
    rebuildSections();
    setStatus(`最終更新: ${new Date().toLocaleTimeString('ja-JP')}　(Beds24連携中)`);
  }catch(e){
    toast('保存エラー: '+e.message, 6000);
    $('saveBtn').disabled=false; setStatus('');
  }
};

// ==== 設定 ====
let cfgActive = 0;
function openSettings(){
  if(!CONFIG) CONFIG = { apiKey:'', floor:8000, active:0, props:[ Object.assign(DEFAULT_PROP(), {name:'野町villa 一棟貸切', roomId:'548308'}) ] };
  cfgActive = CONFIG.active||0;
  $('cfgApiKey').value = CONFIG.apiKey||'';
  $('cfgFloor').value = CONFIG.floor!==undefined?CONFIG.floor:8000;
  $('cfgStdMin').value = CONFIG.stdMin!==undefined?CONFIG.stdMin:2;
  renderCfgProp();
  $('settingsOverlay').classList.add('show');
}
function renderCfgProp(){
  $('cfgPropSel').innerHTML = CONFIG.props.map((p,i)=>`<option value="${i}" ${i===cfgActive?'selected':''}>${p.name}</option>`).join('');
  const p = CONFIG.props[cfgActive];
  $('cfgName').value = p.name||'';
  $('cfgPropKey').value = p.propKey||'';
  $('cfgRoomId').value = p.roomId||'';
  renderCfgRows(p.rows||[]);
}
function renderCfgRows(rows){
  $('cfgRows').innerHTML = rows.map((r,i)=>`
    <div class="rowdef" data-i="${i}">
      <input class="rd-code" value="${r.code}">
      <input class="rd-label" value="${r.label}">
      <input class="rd-ratio" type="number" step="0.001" value="${r.ratio!==null&&r.ratio!==undefined?r.ratio:''}">
      <button data-del="${i}">×</button>
    </div>`).join('');
  $('cfgRows').querySelectorAll('button[data-del]').forEach(b=>{
    b.onclick = ()=>{ collectCfgProp(); CONFIG.props[cfgActive].rows.splice(parseInt(b.dataset.del),1); renderCfgRows(CONFIG.props[cfgActive].rows); };
  });
}
function collectCfgProp(){
  const p = CONFIG.props[cfgActive];
  p.name = $('cfgName').value.trim();
  p.propKey = $('cfgPropKey').value.trim();
  p.roomId = $('cfgRoomId').value.trim();
  p.rows = [...$('cfgRows').querySelectorAll('.rowdef')].map(div=>({
    code: div.querySelector('.rd-code').value.trim().toLowerCase(),
    label: div.querySelector('.rd-label').value.trim(),
    ratio: parseFloat(div.querySelector('.rd-ratio').value)||null
  })).filter(r=>r.code);
}
$('cfgPropSel').addEventListener('change', ()=>{ collectCfgProp(); cfgActive = parseInt($('cfgPropSel').value); renderCfgProp(); });
$('cfgAddProp').onclick = ()=>{ collectCfgProp(); CONFIG.props.push(DEFAULT_PROP()); cfgActive = CONFIG.props.length-1; renderCfgProp(); };
$('cfgAddRow').onclick = ()=>{ collectCfgProp(); CONFIG.props[cfgActive].rows.push({code:'', label:'', ratio:null}); renderCfgRows(CONFIG.props[cfgActive].rows); };
$('cfgDelProp').onclick = ()=>{
  if(CONFIG.props.length<=1){ toast('最後の物件は削除できません'); return; }
  if(!confirm(`「${CONFIG.props[cfgActive].name}」を削除しますか?`)) return;
  CONFIG.props.splice(cfgActive,1); cfgActive=0; renderCfgProp();
};
$('settingsBtn').onclick = openSettings;
$('cfgSaveBtn').onclick = ()=>{
  collectCfgProp();
  CONFIG.apiKey = $('cfgApiKey').value.trim();
  CONFIG.floor = parseInt($('cfgFloor').value)||0;
  CONFIG.stdMin = parseInt($('cfgStdMin').value)||2;
  CONFIG.active = cfgActive;
  const p = CONFIG.props[cfgActive];
  if(!CONFIG.apiKey || !p.propKey || !p.roomId){ toast('APIキー・propKey・roomIdは必須です'); return; }
  saveConfig(CONFIG);
  $('settingsOverlay').classList.remove('show');
  renderRowInputs();
  resetTo(state.startY, state.startM);
};

// ==== 月ピッカー(年表示から数ヶ月先へジャンプ) ====
let mpYear = null;
function renderMonthPicker(){
  $('mpYear').textContent = mpYear + '年';
  const now = new Date();
  let html='';
  for(let mm=0; mm<12; mm++){
    const isCur = (mpYear===state.startY && mm===state.startM);
    const isPast = new Date(mpYear, mm+1, 0) < new Date(now.getFullYear(), now.getMonth(), 1);
    html += `<button data-m="${mm}" class="${isCur?'cur':''}${isPast?' past':''}">${mm+1}月</button>`;
  }
  $('mpGrid').innerHTML = html;
  $('mpGrid').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      $('monthPickerOverlay').classList.remove('show');
      state.selected.clear();
      resetTo(mpYear, parseInt(b.dataset.m));
    };
  });
}
$('monthLabel').onclick = ()=>{ mpYear = state.startY; renderMonthPicker(); $('monthPickerOverlay').classList.add('show'); };
$('mpPrevY').onclick = ()=>{ mpYear--; renderMonthPicker(); };
$('mpNextY').onclick = ()=>{ mpYear++; renderMonthPicker(); };
$('monthPickerOverlay').addEventListener('click', e=>{ if(e.target.id==='monthPickerOverlay') e.target.classList.remove('show'); });

loadConfig();
if(CONFIG){ renderPropSel(); renderRowInputs(); }
resetTo(state.startY, state.startM);
</script>
</body>
